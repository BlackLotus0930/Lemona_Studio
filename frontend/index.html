<!doctype html>
<html lang="en" class="dark-theme">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="./lemonalogo.ico" />
    <link rel="icon" type="image/png" href="./lemonalogo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Content Security Policy - Note: Electron will override this via session API, but this provides fallback -->
    <!-- In production, unsafe-eval and unsafe-inline are blocked for better security -->
    <!-- frame-ancestors is ignored in meta tags, only works in HTTP headers (set via Electron session API) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://generativelanguage.googleapis.com https://*.googleapis.com; frame-src 'self' blob: data:; object-src 'self' blob: data:; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" />
    <!-- Theme initialization - must load synchronously before any rendering -->
    <!-- This runs before React loads to prevent white flash on startup -->
    <script src="./theme-init.js"></script>
    <!-- Preload Inter font for faster loading -->
    <link rel="preload" href="/src/assets/fonts/Inter-VariableFont_opsz,wght.ttf" as="font" type="font/ttf" crossorigin />
    <link rel="preload" href="/src/assets/fonts/Inter-Italic-VariableFont_opsz,wght.ttf" as="font" type="font/ttf" crossorigin />
    <!-- Material Icons still need Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=ink_highlighter,language" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
    <title>Lemona</title>
    <!-- Prevent white flash - set dark theme background before CSS loads -->
    <style>
      html {
        background-color: #141414;
      }
      body, #root {
        background-color: #141414;
        color: #D6D6DD;
      }
      html:not(.dark-theme) {
        background-color: #ffffff;
      }
      html:not(.dark-theme) body,
      html:not(.dark-theme) #root {
        background-color: #ffffff;
        color: #202124;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
